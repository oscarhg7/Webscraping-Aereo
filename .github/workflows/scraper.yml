name: Scraper vuelos

on:
  schedule:
    - cron: '0 5 11 * *'   # Ejecuta el día 11 de cada mes a las 05:00 UTC
  workflow_dispatch:       # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Instalar Geckodriver
        run: |
          sudo apt-get install -y firefox-geckodriver
          geckodriver --version

      - name: Ejecutar scraper
        run: python Proyecto_aereo.py

      - name: Subir resultados al repositorio
        uses: EndBug/add-and-commit@v9
        with:
          add: '.'
          message: "Actualización automática datos vuelos"
